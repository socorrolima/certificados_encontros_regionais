
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Certificados — SNAS/MDS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{background:#f4f6f9;font-family:'Segoe UI',Arial,sans-serif}
.header{background:#003580;color:#fff;padding:16px 28px}
.card{border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);border:none;background:#fff}
#canvas-cert{width:100%;height:auto;display:block;border:2px solid #e5e7eb;border-radius:8px}
</style>
</head>
<body>

<div class="header d-flex align-items-center gap-3">
  <div>
    <div class="fw-bold" style="font-size:1.15rem">🏛️ SNAS / MDS</div>
    <div style="font-size:.78rem;opacity:.82">Secretaria Nacional de Assistência Social</div>
  </div>
  <span class="badge ms-auto" style="background:#1a7a3c">GOV.BR</span>
</div>

<div class="container py-4" style="max-width:820px">
  <div class="card p-4 mb-4">
    <h5 class="fw-bold text-primary mb-1">📄 Emissão de Certificado</h5>
    <p class="text-muted small mb-4">Digite seu nome completo para gerar seu certificado.</p>
    <div id="aviso-config" class="alert alert-warning small py-2 mb-3" style="display:none">
      ⚠️ Sistema não configurado. Contate o administrador.
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Nome completo</label>
      <input type="text" id="inp-nome" class="form-control" placeholder="Ex: João Silva"/>
    </div>
    <div class="mb-3" id="wrap-evento" style="display:none">
      <label class="form-label fw-semibold">Evento</label>
      <select id="sel-evento" class="form-select"></select>
    </div>
    <button class="btn btn-primary w-100 fw-bold py-2" id="btn-gerar">🎓 Gerar Certificado</button>
    <div id="msg-busca" class="mt-3" style="display:none"></div>
  </div>

  <div class="card p-4" id="area-preview" style="display:none">
    <h5 class="fw-bold text-primary mb-3">🖼️ Pré-visualização</h5>
    <canvas id="canvas-cert"></canvas>
    <div id="qr-wrap" class="text-center mt-3" style="display:none">
      <p class="small text-muted mb-1">QR Code de validação</p>
      <div id="qr"></div>
    </div>
    <div class="d-flex gap-2 mt-3 flex-wrap">
      <button class="btn btn-success fw-bold" id="btn-pdf">⬇️ Baixar PDF</button>
      <button class="btn btn-outline-primary fw-bold" id="btn-limpar">🔄 Nova consulta</button>
    </div>
    <div id="cert-codigo" class="mt-2 text-muted small"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var CHAVE = 'cert_eventos';
var certAtual = null;

// ── Eventos de botão ───────────────────────────────
document.getElementById('btn-gerar').addEventListener('click', buscar);
document.getElementById('btn-pdf').addEventListener('click', baixarPDF);
document.getElementById('btn-limpar').addEventListener('click', limpar);
document.getElementById('inp-nome').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscar();
});

// ── Inicialização ──────────────────────────────────
verificarConfig();

function getEventos() {
  try { return JSON.parse(localStorage.getItem(CHAVE) || '[]'); }
  catch(e) { return []; }
}

function verificarConfig() {
  var evs = getEventos().filter(function(e) { return e.participantes && e.participantes.length > 0; });
  document.getElementById('aviso-config').style.display = evs.length ? 'none' : 'block';
  if (evs.length > 1) {
    var sel = document.getElementById('sel-evento');
    sel.innerHTML = evs.map(function(e, i) {
      return '<option value="' + i + '">' + e.nome + ' — ' + e.cidade + '</option>';
    }).join('');
    document.getElementById('wrap-evento').style.display = '';
  }
}

function normalizar(t) {
  if (!t) return '';
  return t.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

function similaridade(a, b) {
  a = normalizar(a); b = normalizar(b);
  if (a === b) return 1.0;
  if (a.indexOf(b) >= 0 || b.indexOf(a) >= 0) return 0.9;
  var pa = a.split(' ');
  var pb = b.split(' ');
  var comuns = pa.filter(function(x) { return pb.indexOf(x) >= 0; });
  return comuns.length / Math.max(pa.length, pb.length);
}

function buscar() {
  var nome = document.getElementById('inp-nome').value.trim();
  if (!nome) { showMsg('⚠️ Digite seu nome completo.', 'warning'); return; }

  var todos = getEventos();
  var evs   = todos.filter(function(e) { return e.participantes && e.participantes.length > 0; });
  if (!evs.length) { showMsg('⚠️ Sistema não configurado.', 'warning'); return; }

  var evento, idxReal;
  if (evs.length === 1) {
    evento   = evs[0];
    idxReal  = todos.indexOf(evento);
  } else {
    var sel  = parseInt(document.getElementById('sel-evento').value);
    evento   = evs[sel];
    idxReal  = todos.indexOf(evento);
  }

  var nb  = normalizar(nome);
  var enc = null;
  for (var i = 0; i < evento.participantes.length; i++) {
    if (normalizar(evento.participantes[i].nome) === nb) {
      enc = evento.participantes[i];
      break;
    }
  }

  if (!enc) {
    var best = null, score = 0;
    for (var j = 0; j < evento.participantes.length; j++) {
      var s = similaridade(nome, evento.participantes[j].nome);
      if (s > score) { score = s; best = evento.participantes[j]; }
    }
    if (score >= 0.80) enc = best;
  }

  if (!enc) {
    showMsg('❌ Nome não encontrado. Favor procurar os organizadores do evento.', 'danger');
    document.getElementById('area-preview').style.display = 'none';
    return;
  }

  showMsg('✅ Participante encontrado! Gerando certificado...', 'success');
  certAtual = { participante: enc, evento: evento, idxReal: idxReal };
  gerarCertificado(enc, evento, idxReal);
}

function preencher(tmpl, dados) {
  var t = tmpl;
  var chaves = Object.keys(dados);
  for (var i = 0; i < chaves.length; i++) {
    t = t.split('{' + chaves[i] + '}').join(dados[chaves[i]] || '');
  }
  return t;
}

function quebrarLinhas(ctx, texto, maxLarg) {
  var palavras = texto.split(' ');
  var linhas = [];
  var atual = '';
  for (var i = 0; i < palavras.length; i++) {
    var teste = atual ? atual + ' ' + palavras[i] : palavras[i];
    if (ctx.measureText(teste).width > maxLarg && atual) {
      linhas.push(atual);
      atual = palavras[i];
    } else {
      atual = teste;
    }
  }
  if (atual) linhas.push(atual);
  return linhas;
}

function gerarCertificado(participante, evento, idxReal) {
  var tmplB64 = localStorage.getItem('cert_template_' + idxReal);
  var canvas  = document.getElementById('canvas-cert');
  var ctx     = canvas.getContext('2d');

  function desenharTexto(img) {
    var W = img.naturalWidth  || img.width  || 2480;
    var H = img.naturalHeight || img.height || 1754;
    canvas.width  = W;
    canvas.height = H;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);

    var texto = preencher(evento.texto, {
      Nome:          participante.nome,
      Municipio:     participante.municipio || '',
      Cidade:        evento.cidade,
      Data:          evento.periodo,
      Carga_Horaria: evento.carga
    });

    var linhasRaw = texto.split('\n');
    var sz  = Math.round(W * 0.020);
    var lh  = sz * 1.7;
    var max = W * 0.72;

    ctx.font         = 'bold ' + sz + 'px Arial, sans-serif';
    ctx.fillStyle    = '#1a1a1a';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = 'rgba(255,255,255,0.95)';
    ctx.shadowBlur   = 6;

    var linhas = [];
    for (var i = 0; i < linhasRaw.length; i++) {
      if (linhasRaw[i].trim()) {
        var sub = quebrarLinhas(ctx, linhasRaw[i], max);
        for (var j = 0; j < sub.length; j++) linhas.push(sub[j]);
      }
    }

    var totalH = linhas.length * lh;
    var yStart = H * 0.42 - totalH / 2 + lh / 2;
    for (var k = 0; k < linhas.length; k++) {
      ctx.fillText(linhas[k], W / 2, yStart + k * lh);
    }

    ctx.shadowBlur = 0;

    var codigo = 'CERT-' + new Date().getFullYear() + '-' + String(Date.now()).slice(-6);
    certAtual.codigo = codigo;

    document.getElementById('area-preview').style.display = 'block';
    document.getElementById('area-preview').scrollIntoView({ behavior: 'smooth' });
    document.getElementById('cert-codigo').innerHTML = 'Código: <strong>' + codigo + '</strong>';

    var qw = document.getElementById('qr-wrap');
    qw.style.display = 'block';
    document.getElementById('qr').innerHTML = '';
    new QRCode(document.getElementById('qr'), {
      text: window.location.href.replace('index.html','') + 'validar.html?cert=' + codigo,
      width: 100, height: 100
    });

    showMsg('✅ Certificado gerado para: ' + participante.nome, 'success');
  }

  if (tmplB64) {
    var img = new Image();
    img.onload = function() { desenharTexto(img); };
    img.onerror = function() { desenharTexto(criarDemo()); };
    img.src = tmplB64;
  } else {
    desenharTexto(criarDemo());
  }
}

function criarDemo() {
  var W = 2480, H = 1754;
  var c = document.createElement('canvas');
  c.width = W; c.height = H;
  var ctx = c.getContext('2d');
  var g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#eef2ff'); g.addColorStop(1,'#dbeafe');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#003580'; ctx.lineWidth=28; ctx.strokeRect(36,36,W-72,H-72);
  ctx.strokeStyle='#1a56db'; ctx.lineWidth=8;  ctx.strokeRect(66,66,W-132,H-132);
  ctx.fillStyle='#003580'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font='bold 72px Arial'; ctx.fillText('MINISTÉRIO DO DESENVOLVIMENTO E ASSISTÊNCIA SOCIAL',W/2,140);
  ctx.font='bold 150px Georgia,serif'; ctx.fillText('CERTIFICADO',W/2,360);
  ctx.fillStyle='#1a56db'; ctx.fillRect(280,560,W-560,6);
  ctx.font='44px Arial'; ctx.fillStyle='#6b7280'; ctx.fillText('Brasília — 2026',W/2,H-160);
  var img = new Image();
  img.src = c.toDataURL('image/png');
  return img;
}

function baixarPDF() {
  if (!certAtual) return;
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  doc.addImage(
    document.getElementById('canvas-cert').toDataURL('image/png', 1.0),
    'PNG', 0, 0, 297, 210
  );
  doc.save('Certificado_' + certAtual.participante.nome.replace(/\s+/g,'_') + '.pdf');
}

function showMsg(txt, tipo) {
  var el = document.getElementById('msg-busca');
  el.className = 'alert alert-' + tipo + ' py-2 small';
  el.textContent = txt;
  el.style.display = 'block';
}

function limpar() {
  document.getElementById('inp-nome').value = '';
  document.getElementById('area-preview').style.display = 'none';
  document.getElementById('msg-busca').style.display = 'none';
  certAtual = null;
  window.scrollTo({ top:0, behavior:'smooth' });
}
</script>
</body>
</html>
