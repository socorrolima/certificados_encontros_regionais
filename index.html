<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Certificados SNAS/MDS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{background:#f4f6f9;font-family:'Segoe UI',Arial,sans-serif}
.header{background:#003580;color:#fff;padding:16px 28px}
.card{border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);border:none;background:#fff}
#canvas-cert{width:100%;height:auto;display:block;border:2px solid #e5e7eb;border-radius:8px}
</style>
</head>
<body>
<div class="header d-flex align-items-center gap-3">
  <div>
    <div class="fw-bold" style="font-size:1.15rem">🏛️ SNAS / MDS</div>
    <div style="font-size:.78rem;opacity:.82">Secretaria Nacional de Assistência Social</div>
  </div>
  <span class="badge ms-auto" style="background:#1a7a3c">GOV.BR</span>
</div>
<div class="container py-4" style="max-width:820px">
  <div class="card p-4 mb-4">
    <h5 class="fw-bold text-primary mb-1">📄 Emissão de Certificado</h5>
    <p class="text-muted small mb-4">Digite seu nome completo para gerar seu certificado.</p>
    <div id="aviso-config" class="alert alert-warning small py-2 mb-3" style="display:none">
      Sistema não configurado. Contate o administrador.
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Nome completo</label>
      <input type="text" id="inp-nome" class="form-control" placeholder="Ex: João Silva"/>
    </div>
    <div class="mb-3" id="wrap-evento" style="display:none">
      <label class="form-label fw-semibold">Evento</label>
      <select id="sel-evento" class="form-select"></select>
    </div>
    <button class="btn btn-primary w-100 fw-bold py-2" id="btn-gerar">🎓 Gerar Certificado</button>
    <div id="msg-busca" class="mt-3" style="display:none"></div>
  </div>
  <div class="card p-4" id="area-preview" style="display:none">
    <h5 class="fw-bold text-primary mb-3">Pré-visualização</h5>
    <canvas id="canvas-cert"></canvas>
    <div id="qr-wrap" class="text-center mt-3" style="display:none">
      <p class="small text-muted mb-1">QR Code de validação</p>
      <div id="qr"></div>
    </div>
    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-success fw-bold" id="btn-pdf">Baixar PDF</button>
      <button class="btn btn-outline-primary fw-bold" id="btn-limpar">Nova consulta</button>
    </div>
    <div id="cert-codigo" class="mt-2 text-muted small"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var CHAVE = 'cert_eventos';
var certAtual = null;

document.getElementById('btn-gerar').onclick = buscar;
document.getElementById('btn-pdf').onclick = baixarPDF;
document.getElementById('btn-limpar').onclick = limpar;
document.getElementById('inp-nome').onkeydown = function(e){ if(e.key==='Enter') buscar(); };

init();

function init() {
  var evs = getEventos().filter(function(e){ return e.participantes && e.participantes.length > 0; });
  document.getElementById('aviso-config').style.display = evs.length ? 'none' : 'block';
  if (evs.length > 1) {
    var sel = document.getElementById('sel-evento');
    sel.innerHTML = evs.map(function(e,i){ return '<option value="'+i+'">'+e.nome+' — '+e.cidade+'</option>'; }).join('');
    document.getElementById('wrap-evento').style.display = '';
  }
}

function getEventos() {
  try { return JSON.parse(localStorage.getItem(CHAVE) || '[]'); } catch(e) { return []; }
}

function norm(t) {
  if (!t) return '';
  return t.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
}

function sim(a,b) {
  a=norm(a); b=norm(b);
  if (a===b) return 1;
  if (a.indexOf(b)>=0||b.indexOf(a)>=0) return 0.9;
  var pa=a.split(' '), pb=b.split(' ');
  var c=pa.filter(function(x){return pb.indexOf(x)>=0;});
  return c.length/Math.max(pa.length,pb.length);
}

function buscar() {
  var nome = document.getElementById('inp-nome').value.trim();
  if (!nome) { msg('Digite seu nome completo.','warning'); return; }
  var todos = getEventos();
  var evs = todos.filter(function(e){ return e.participantes && e.participantes.length > 0; });
  if (!evs.length) { msg('Sistema não configurado.','warning'); return; }
  var evento, idx;
  if (evs.length===1) { evento=evs[0]; idx=todos.indexOf(evento); }
  else { var s=parseInt(document.getElementById('sel-evento').value); evento=evs[s]; idx=todos.indexOf(evento); }
  var nb=norm(nome), enc=null;
  for (var i=0;i<evento.participantes.length;i++) {
    if (norm(evento.participantes[i].nome)===nb) { enc=evento.participantes[i]; break; }
  }
  if (!enc) {
    var best=null, score=0;
    for (var j=0;j<evento.participantes.length;j++) {
      var s2=sim(nome,evento.participantes[j].nome);
      if (s2>score){ score=s2; best=evento.participantes[j]; }
    }
    if (score>=0.8) enc=best;
  }
  if (!enc) { msg('Nome não encontrado. Procure os organizadores.','danger'); document.getElementById('area-preview').style.display='none'; return; }
  msg('Participante encontrado! Gerando...','success');
  certAtual={participante:enc,evento:evento,idx:idx};
  gerar(enc,evento,idx);
}

function fill(tmpl,dados) {
  var t=tmpl;
  var ks=Object.keys(dados);
  for (var i=0;i<ks.length;i++) t=t.split('{'+ks[i]+'}').join(dados[ks[i]]||'');
  return t;
}

function wrap(ctx,texto,max) {
  var ws=texto.split(' '), ls=[], cur='';
  for (var i=0;i<ws.length;i++) {
    var t=cur?cur+' '+ws[i]:ws[i];
    if (ctx.measureText(t).width>max&&cur){ ls.push(cur); cur=ws[i]; } else cur=t;
  }
  if (cur) ls.push(cur);
  return ls;
}

function gerar(p,ev,idx) {
  var b64=localStorage.getItem('cert_template_'+idx);
  var canvas=document.getElementById('canvas-cert');
  var ctx=canvas.getContext('2d');

  function draw(img) {
    var W=img.naturalWidth||img.width||2480;
    var H=img.naturalHeight||img.height||1754;
    canvas.width=W; canvas.height=H;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(img,0,0,W,H);
    var texto=fill(ev.texto,{Nome:p.nome,Municipio:p.municipio||'',Cidade:ev.cidade,Data:ev.periodo,Carga_Horaria:ev.carga});
    var raws=texto.split('\n');
    var sz=Math.round(W*0.02), lh=sz*1.7, mx=W*0.72;
    ctx.font='bold '+sz+'px Arial';
    ctx.fillStyle='#1a1a1a'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(255,255,255,0.95)'; ctx.shadowBlur=6;
    var ls=[];
    for (var i=0;i<raws.length;i++) if(raws[i].trim()) { var sub=wrap(ctx,raws[i],mx); for(var j=0;j<sub.length;j++) ls.push(sub[j]); }
    var th=ls.length*lh, y0=H*0.20-th/2+lh/2;
    for (var k=0;k<ls.length;k++) ctx.fillText(ls[k],W/2,y0+k*lh);
    ctx.shadowBlur=0;
    var cod='CERT-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-6);
    certAtual.codigo=cod;
    document.getElementById('area-preview').style.display='block';
    document.getElementById('area-preview').scrollIntoView({behavior:'smooth'});
    document.getElementById('cert-codigo').innerHTML='Código: <strong>'+cod+'</strong>';
    var qw=document.getElementById('qr-wrap'); qw.style.display='block';
    document.getElementById('qr').innerHTML='';
    new QRCode(document.getElementById('qr'),{text:window.location.href+'?cert='+cod,width:100,height:100});
    msg('Certificado gerado para: '+p.nome,'success');
  }

  if (b64) {
    var im=new Image();
    im.onload=function(){ draw(im); };
    im.onerror=function(){ draw(demo()); };
    im.src=b64;
  } else {
    draw(demo());
  }
}

function demo() {
  var W=2480,H=1754,c=document.createElement('canvas');
  c.width=W; c.height=H;
  var x=c.getContext('2d');
  var g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,'#eef2ff'); g.addColorStop(1,'#dbeafe');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  x.strokeStyle='#003580'; x.lineWidth=28; x.strokeRect(36,36,W-72,H-72);
  x.strokeStyle='#1a56db'; x.lineWidth=8; x.strokeRect(66,66,W-132,H-132);
  x.fillStyle='#003580'; x.textAlign='center'; x.textBaseline='top';
  x.font='bold 72px Arial'; x.fillText('MINISTERIO DO DESENVOLVIMENTO E ASSISTENCIA SOCIAL',W/2,140);
  x.font='bold 150px Georgia'; x.fillText('CERTIFICADO',W/2,360);
  x.fillStyle='#1a56db'; x.fillRect(280,560,W-560,6);
  var im=new Image(); im.src=c.toDataURL('image/png'); return im;
}

function baixarPDF() {
  if (!certAtual) return;
  var doc=new window.jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.addImage(document.getElementById('canvas-cert').toDataURL('image/png',1),'PNG',0,0,297,210);
  doc.save('Certificado_'+certAtual.participante.nome.replace(/\s+/g,'_')+'.pdf');
}

function msg(txt,tipo) {
  var el=document.getElementById('msg-busca');
  el.className='alert alert-'+tipo+' py-2 small';
  el.textContent=txt; el.style.display='block';
}

function limpar() {
  document.getElementById('inp-nome').value='';
  document.getElementById('area-preview').style.display='none';
  document.getElementById('msg-busca').style.display='none';
  certAtual=null; window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
